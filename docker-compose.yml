version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    command: bun --cwd packages/opencode src/index.ts serve --port 50900 --hostname 0.0.0.0 --cors http://localhost:50902
    ports:
      - "50900:50900"
    environment:
      - MIMOCODE_HOME=/app/.dev-home
      - BOB_HOME=/app/.dev-home
      - HIAI_BOB_HOME=/app/.dev-home
    volumes:
      - bob-data:/app/.dev-home

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    command: bun --cwd packages/app dev --host 0.0.0.0 --port 50902
    ports:
      - "50902:50902"
    depends_on:
      - backend

volumes:
  bob-data:
