name: CI

on:
  push:
    branches: [master]
    tags:
      - 'v*'
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # 1. Lint — oxlint
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install
      - run: bun run lint

  # 2. Typecheck
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install
      - run: bun typecheck

  # 3. Test
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install
      - run: cd packages/opencode && bun test

  # 4. Docker build + scan
  docker-build:
    name: Docker Build & Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build hiai-bobcode image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          tags: hiai-bobcode:ci-${{ github.sha }}
          load: true

      - name: Security scan with Trivy
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: hiai-bobcode:ci-${{ github.sha }}
          format: "sarif"
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"
          output: "trivy.sarif"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif
          category: trivy

      # Push to Docker Hub ONLY on version tags
      - name: Log in to Docker Hub
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and push Docker image
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          docker tag hiai-bobcode:ci-${{ github.sha }} vgalibov/hiai-bobcode:${{ github.ref_name }}
          docker tag hiai-bobcode:ci-${{ github.sha }} vgalibov/hiai-bobcode:latest
          docker push vgalibov/hiai-bobcode:${{ github.ref_name }}
          docker push vgalibov/hiai-bobcode:latest

  # 5. NPM publish (only on version tags)
  publish-npm:
    name: Publish NPM
    needs: [lint, typecheck, test, docker-build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Upgrade npm for OIDC
        run: npm install -g npm@latest
      - run: bun install
      - name: Build and publish
        env:
          CLEAN_VERSION: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          CLEAN_VERSION="${TAG_VERSION#v}"
          CLEAN_VERSION="$CLEAN_VERSION" ./script/publish.ts
